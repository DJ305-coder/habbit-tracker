<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Daily Habit Tracker with Google Sheets</title>
  <!-- Tailwind CSS + Font Awesome -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    .habit-checkbox { transition: all 0.2s ease; }
    .habit-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .habit-card:hover { transform: translateY(-2px); box-shadow: 0 12px 20px -12px rgba(0, 0, 0, 0.15); }
    .habits-scroll { scrollbar-width: thin; scrollbar-color: #cbd5e1 #f1f5f9; }
    .habits-scroll::-webkit-scrollbar { height: 4px; width: 4px; }
    .habits-scroll::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 20px; }
    .habits-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 20px; }
    .progress-ring { transition: stroke-dashoffset 0.35s ease; }
    button:active { transform: scale(0.97); }
    .animate-fade { animation: fadeSlideIn 0.25s ease-out forwards; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .toast-notification { position: fixed; bottom: 20px; right: 20px; z-index: 1000; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-white to-indigo-50/40 min-h-screen p-4 md:p-6">

  <div class="max-w-2xl mx-auto">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6 mt-2">
      <div>
        <h1 class="text-3xl md:text-4xl font-bold tracking-tight bg-gradient-to-r from-indigo-700 to-purple-700 bg-clip-text text-transparent">
          <i class="fa-regular fa-calendar-check text-indigo-500 mr-2"></i> Daily Habit Tracker
        </h1>
        <p class="text-slate-500 text-sm mt-1 flex items-center gap-1">
          <i class="fa-regular fa-clock"></i> <span id="currentDate"></span> — syncs with Google Sheets
        </p>
      </div>
      <div class="bg-white/70 backdrop-blur-sm rounded-2xl px-4 py-2 shadow-sm border border-slate-200 flex items-center gap-3 w-fit self-start sm:self-auto">
        <div class="relative w-10 h-10">
          <svg class="w-10 h-10 transform -rotate-90" viewBox="0 0 36 36">
            <circle cx="18" cy="18" r="16" fill="none" stroke="#e2e8f0" stroke-width="2.5"></circle>
            <circle id="progressCircle" cx="18" cy="18" r="16" fill="none" stroke="#8b5cf6" stroke-width="2.5" stroke-dasharray="100" stroke-dashoffset="100" stroke-linecap="round" class="progress-ring"></circle>
          </svg>
          <span class="absolute inset-0 flex items-center justify-center text-xs font-bold text-indigo-700" id="completionPercent">0%</span>
        </div>
        <div class="text-left">
          <p class="text-[11px] font-medium text-slate-400 uppercase tracking-wide">Today's progress</p>
          <p class="text-lg font-semibold text-slate-700 leading-5"><span id="completedCount">0</span>/<span id="totalCount">0</span></p>
        </div>
      </div>
    </div>

    <!-- Add Habit Form -->
    <div class="bg-white rounded-2xl shadow-md border border-slate-100 p-4 mb-6 transition-all">
      <div class="flex flex-col sm:flex-row gap-3">
        <div class="flex-1">
          <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-1">New habit</label>
          <div class="relative">
            <i class="fa-regular fa-pen-to-square absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
            <input type="text" id="habitInput" placeholder="e.g., Drink 2L water, Meditate, Read 20min" 
                   class="w-full pl-9 pr-3 py-2.5 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none transition bg-slate-50/50">
          </div>
        </div>
        <div class="flex gap-2 items-end">
          <div class="min-w-[100px]">
            <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-1">Category</label>
            <select id="categorySelect" class="w-full border border-slate-200 rounded-xl py-2.5 px-3 bg-slate-50/50 text-sm focus:ring-indigo-300 focus:border-indigo-400 outline-none">
              <option value="Health">🧘 Health</option>
              <option value="Productivity">📚 Productivity</option>
              <option value="Mindfulness">🌿 Mindfulness</option>
              <option value="Fitness">💪 Fitness</option>
              <option value="Self Care">✨ Self Care</option>
              <option value="Coding">💻 Coding</option>
              <option value="Learning">📖 Learning</option>
            </select>
          </div>
          <button id="addHabitBtn" class="bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white px-5 py-2.5 rounded-xl shadow-md transition-all flex items-center gap-2 font-medium">
            <i class="fa-regular fa-plus"></i> <span>Add</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Habits List -->
    <div class="bg-white/40 rounded-2xl p-1">
      <div class="flex items-center justify-between px-2 pb-2">
        <h2 class="text-lg font-semibold text-slate-700 flex items-center gap-2"><i class="fa-regular fa-list-check text-indigo-500"></i> Today's habits</h2>
        <button id="resetDayBtn" class="text-xs text-slate-400 hover:text-rose-500 transition flex items-center gap-1 bg-white px-3 py-1.5 rounded-full shadow-sm border"><i class="fa-regular fa-trash-can"></i> Reset day</button>
      </div>
      <div id="habitsList" class="space-y-3 habits-scroll max-h-[460px] overflow-y-auto pr-1">
        <div id="emptyState" class="flex flex-col items-center justify-center py-12 px-4 text-center animate-fade">
          <div class="w-20 h-20 bg-indigo-50 rounded-full flex items-center justify-center mb-3">
            <i class="fa-regular fa-face-smile text-3xl text-indigo-300"></i>
          </div>
          <p class="text-slate-500 font-medium">No habits yet, start your journey ✨</p>
          <p class="text-slate-400 text-sm mt-1">Add your first habit above</p>
        </div>
      </div>
    </div>

    <div class="mt-8 text-center text-xs text-slate-400 flex flex-wrap justify-center gap-3 border-t border-slate-200/60 pt-5">
      <span><i class="fa-regular fa-check-circle text-emerald-500"></i> Track daily streaks</span>
      <span><i class="fa-regular fa-moon"></i> Build consistency</span>
      <span><i class="fa-regular fa-heart"></i> Celebrate small wins</span>
    </div>
  </div>

  <div id="toast" class="toast-notification hidden bg-green-500 text-white px-4 py-2 rounded-lg shadow-lg text-sm"></div>

  <script>
    // ============================================
    // 🔴 IMPORTANT: REPLACE WITH YOUR GOOGLE SHEETS WEB APP URL
    // ============================================
    const GOOGLE_SHEETS_API_URL = 'https://script.google.com/macros/s/AKfycbwZlE-KuA6FV3NjFUAoU30El1-w_Abn-bhJDhPYU_r-bBuCRlN06VuEdFhaaoGcaMd-Fg/exec';
    
    // ============================================
    // HABIT TRACKER CORE LOGIC
    // ============================================
    let habits = [];
    const STORAGE_KEY = "daily_habit_tracker_app";

    function loadHabits() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try {
          const parsed = JSON.parse(stored);
          if (Array.isArray(parsed)) habits = parsed;
          else habits = [];
        } catch(e) { habits = []; }
      } else {
        habits = [
          { id: "demo1", name: "Wake up at 5 am", category: "Self Care", completed: false, createdAt: Date.now() },
          { id: "demo2", name: "DSA 1 concept 2 programs", category: "Productivity", completed: false, createdAt: Date.now() },
          { id: "demo3", name: "System design", category: "Productivity", completed: false, createdAt: Date.now() },
          { id: "demo4", name: "English 5 words", category: "Mindfulness", completed: false, createdAt: Date.now() },
          { id: "demo5", name: "English spoken 15 min", category: "Mindfulness", completed: false, createdAt: Date.now() },
          { id: "demo6", name: "Gym", category: "Fitness", completed: false, createdAt: Date.now() },
          { id: "demo7", name: "30 min Reading", category: "Productivity", completed: false, createdAt: Date.now() }
        ];
        persistHabits();
      }
      renderHabitsList();
      updateProgressStats();
    }

    function persistHabits() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(habits));
    }

    function updateProgressStats() {
      const total = habits.length;
      const completedCount = habits.filter(h => h.completed === true).length;
      const percent = total === 0 ? 0 : Math.round((completedCount / total) * 100);
      document.getElementById("completedCount").innerText = completedCount;
      document.getElementById("totalCount").innerText = total;
      document.getElementById("completionPercent").innerText = `${percent}%`;
      const circle = document.getElementById("progressCircle");
      if (circle) circle.style.strokeDashoffset = 100 - percent;
    }

    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast-notification ${isError ? 'bg-red-500' : 'bg-green-500'} text-white px-4 py-2 rounded-lg shadow-lg text-sm`;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    // ============================================
    // GOOGLE SHEETS INTEGRATION
    // ============================================
    async function sendToGoogleSheets(habitName, category, isCompleted) {
      try {
        const payload = {
          habitName: habitName,
          category: category,
          completed: isCompleted,
          timestamp: new Date().toISOString()
        };
        
        const response = await fetch(GOOGLE_SHEETS_API_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        console.log(`✅ Synced to Google Sheets: ${habitName} - ${isCompleted ? 'Completed' : 'Pending'}`);
        showToast(`📤 Synced: ${habitName}`);
        return true;
      } catch (error) {
        console.error('❌ Google Sheets sync failed:', error);
        showToast(`⚠️ Offline mode: ${habitName} saved locally`, true);
        return false;
      }
    }

    // ============================================
    // HABIT MANAGEMENT
    // ============================================
    async function toggleHabit(habitId) {
      const habit = habits.find(h => h.id === habitId);
      if (habit) {
        habit.completed = !habit.completed;
        persistHabits();
        renderHabitsList();
        updateProgressStats();
        await sendToGoogleSheets(habit.name, habit.category, habit.completed);
      }
    }

    function deleteHabit(habitId) {
      const habit = habits.find(h => h.id === habitId);
      if (confirm(`Delete "${habit?.name}"?`)) {
        habits = habits.filter(h => h.id !== habitId);
        persistHabits();
        renderHabitsList();
        updateProgressStats();
        showToast(`🗑️ Deleted: ${habit?.name}`);
      }
    }

    async function addNewHabit() {
      const inputEl = document.getElementById("habitInput");
      const habitName = inputEl.value.trim();
      if (habitName === "") {
        inputEl.classList.add("ring-2", "ring-rose-300");
        setTimeout(() => inputEl.classList.remove("ring-2", "ring-rose-300"), 500);
        return;
      }
      const category = document.getElementById("categorySelect").value;
      const newHabit = {
        id: Date.now() + "-" + Math.random().toString(36).substr(2, 6),
        name: habitName,
        category: category,
        completed: false,
        createdAt: Date.now()
      };
      habits.unshift(newHabit);
      persistHabits();
      renderHabitsList();
      updateProgressStats();
      await sendToGoogleSheets(habitName, category, false);
      inputEl.value = "";
      const addBtn = document.getElementById("addHabitBtn");
      addBtn.classList.add("bg-emerald-600");
      setTimeout(() => addBtn.classList.remove("bg-emerald-600"), 200);
    }

    function resetTodayCompletions() {
      if (habits.length === 0) return;
      if (confirm("Reset all habits for today? This will uncheck all completed habits.")) {
        habits = habits.map(h => ({ ...h, completed: false }));
        persistHabits();
        renderHabitsList();
        updateProgressStats();
        showToast("🔄 All habits reset for today");
      }
    }

    function getCategoryIcon(category) {
      const map = { "Health": "fa-apple-alt", "Productivity": "fa-chart-line", "Mindfulness": "fa-brain", "Fitness": "fa-dumbbell", "Self Care": "fa-spa" };
      return map[category] || "fa-star";
    }

    function getCategoryColor(category) {
      const colorMap = { "Health": "bg-emerald-100 text-emerald-700", "Productivity": "bg-blue-100 text-blue-700", "Mindfulness": "bg-purple-100 text-purple-700", "Fitness": "bg-orange-100 text-orange-700", "Self Care": "bg-pink-100 text-pink-700" };
      return colorMap[category] || "bg-slate-100 text-slate-600";
    }

    function renderHabitsList() {
      const container = document.getElementById("habitsList");
      const emptyStateDiv = document.getElementById("emptyState");
      if (habits.length === 0) {
        if (emptyStateDiv) emptyStateDiv.style.display = "flex";
        container.innerHTML = "";
        if (emptyStateDiv) container.appendChild(emptyStateDiv);
        return;
      }
      if (emptyStateDiv) emptyStateDiv.style.display = "none";
      const habitCards = document.querySelectorAll(".habit-card-item");
      habitCards.forEach(card => card.remove());
      habits.forEach(habit => {
        const card = document.createElement("div");
        card.className = "habit-card-item bg-white rounded-xl border border-slate-200 shadow-sm p-4 transition-all hover:shadow-md animate-fade";
        card.setAttribute("data-habit-id", habit.id);
        const iconClass = getCategoryIcon(habit.category);
        const badgeColor = getCategoryColor(habit.category);
        card.innerHTML = `
          <div class="flex items-center gap-3">
            <div class="flex-shrink-0">
              <button class="check-btn w-7 h-7 rounded-full border-2 flex items-center justify-center transition-all duration-200 ${habit.completed ? 'bg-indigo-600 border-indigo-600 text-white' : 'border-slate-300 bg-white hover:border-indigo-400'}" data-action="toggle">
                ${habit.completed ? '<i class="fas fa-check text-white text-xs"></i>' : '<i class="fa-regular fa-circle text-slate-400 text-sm"></i>'}
              </button>
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex flex-wrap items-center gap-x-2 gap-y-1">
                <h3 class="font-semibold text-slate-800 text-base truncate ${habit.completed ? 'line-through text-slate-400' : ''}">${escapeHtml(habit.name)}</h3>
                <span class="inline-flex items-center gap-1 text-[11px] font-medium ${badgeColor} px-2 py-0.5 rounded-full"><i class="fas ${iconClass} text-[10px]"></i> ${habit.category}</span>
              </div>
              <p class="text-xs text-slate-400 flex items-center gap-1 mt-1"><i class="fa-regular fa-calendar"></i> daily routine</p>
            </div>
            <button class="delete-btn text-slate-300 hover:text-rose-500 transition-all p-1 rounded-full" data-action="delete">
              <i class="fa-regular fa-trash-alt text-sm"></i>
            </button>
          </div>
        `;
        const checkBtn = card.querySelector("[data-action='toggle']");
        const deleteBtn = card.querySelector("[data-action='delete']");
        checkBtn.addEventListener("click", (e) => { e.stopPropagation(); toggleHabit(habit.id); });
        deleteBtn.addEventListener("click", (e) => { e.stopPropagation(); deleteHabit(habit.id); });
        container.insertBefore(card, emptyStateDiv);
      });
    }

    function escapeHtml(str) {
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    function setCurrentDate() {
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      const today = new Date();
      const formatted = today.toLocaleDateString(undefined, options);
      const dateSpan = document.getElementById("currentDate");
      if (dateSpan) dateSpan.textContent = formatted;
    }

    // Initialize
    document.addEventListener("DOMContentLoaded", () => {
      loadHabits();
      setCurrentDate();
      document.getElementById("addHabitBtn").addEventListener("click", addNewHabit);
      document.getElementById("habitInput").addEventListener("keypress", (e) => { if (e.key === "Enter") addNewHabit(); });
      document.getElementById("resetDayBtn").addEventListener("click", resetTodayCompletions);

      // Test Google Sheets connection on startup
      if (GOOGLE_SHEETS_API_URL.includes('YOUR_SCRIPT_ID')) {
        console.warn('⚠️ Please update GOOGLE_SHEETS_API_URL with your actual Web App URL');
        showToast('⚙️ Update the Google Sheets URL in the script', true);
      } else {
        console.log('✅ Google Sheets API URL configured');
      }
    });
  </script>
</body>
</html>
